{% load static %}

<style>
  .floating-whatsapp {
    position: fixed;
    right: 24px;
    bottom: 24px;
    width: 62px;
    height: 62px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    background: linear-gradient(135deg, #25d366, #128c7e);
    color: #fff;
    text-decoration: none;
    box-shadow: 0 18px 35px rgba(18, 140, 126, 0.32);
    z-index: 1080;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }

  .floating-whatsapp:hover {
    color: #fff;
    transform: translateY(-3px) scale(1.03);
    box-shadow: 0 22px 42px rgba(18, 140, 126, 0.4);
  }

  .floating-whatsapp i {
    font-size: 1.8rem;
    line-height: 1;
  }

  @media (max-width: 767.98px) {
    .floating-whatsapp {
      right: 16px;
      bottom: 18px;
      width: 58px;
      height: 58px;
    }
  }
</style>
